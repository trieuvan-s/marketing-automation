# =====================================================================
# twmkt — cấu hình trung tâm. Nguyên tắc: KHÔNG hard-code trong code,
# mọi giá trị điều chỉnh nằm ở đây. Bí mật (id, key) tham chiếu qua ${ENV}.
# Đọc bằng src/twmkt/config.py -> load_settings().
# =====================================================================

project:
  name: "FVA Capital Marketing"   # metadata mô tả, KHÔNG code nào đọc field này — brand SẢN PHẨM THẬT lấy từ config/brand.yaml (MỘT NGUỒN)
  version: "0.2.0"

paths:
  data_dir: "data"                # tickers/keywords — dữ liệu THAM CHIẾU, ở TRONG repo (khác storage.data_root, dữ liệu RUNTIME)

# --- Lưu trữ tài liệu sạch (persist / audit) ------------------------
# PHASE DATA-ROOT: mọi dữ liệu runtime giờ nằm dưới storage.data_root (NGOÀI
# repo, mặc định "../marketing-database/marketing-automation" — override qua
# biến môi trường DATA_ROOT, xem src/twmkt/config.data_root()). documents_dir/
# output_dir/drafts_dir bên dưới là đường dẫn CON tính từ data_root (KHÔNG
# còn tiền tố "storage/" — resolve qua config.data_path(), xem factory.py).
# Partition theo NGÀY: <data_root>/documents/<YYYY-MM-DD>/<content_hash>.json.
# Dedup theo NỘI DUNG chéo các ngày còn giữ -> crawl nhiều lần/ngày không tạo
# bản trùng. Chỉ giữ `retention_days` ngày mới nhất (folder cũ hơn bị xoá).
storage:
  type: "file"                    # file | memory
  # KHO CHUNG 2 repo (2026-07-21): `marketing-database/` là thư mục dùng CHUNG,
  # mỗi repo ghi vào thư mục con MANG TÊN REPO — marketing-automation/ và
  # aigen-pipeline/ — KHÔNG ghi đè, KHÔNG lẫn lộn. Tên "marketing-database"
  # trung lập có chủ đích (tên cũ "marketing-automation-database" gây hiểu nhầm
  # là của riêng repo này). aigen đọc cùng kho qua config/paths.config.json.
  data_root: "../marketing-database/marketing-automation"   # GỐC DUY NHẤT dữ liệu runtime, NGOÀI repo
  documents_dir: "documents"
  output_dir: "output"
  drafts_dir: "state/production_drafts"   # hàng chờ --draft/--ingest (Claude Code viết nội dung)
  retention_days: 10              # giữ tối đa 10 ngày dữ liệu
  timezone: "Asia/Ho_Chi_Minh"    # mốc chia ngày
  # Sheet UI cleanup Phase 6c — cổng local static file server (scripts/
  # serve_assets.py, twmkt/asset_server.py) phục vụ output_dir qua
  # http://127.0.0.1:PORT/ để link AssetPath trên Sheet bấm mở được (thay
  # cho file:// — bị trình duyệt chặn khi mở từ trang HTTPS, xác nhận THẬT
  # trên Sheet sống ở Phase 6b).
  # ĐỔI 8899 -> 8898 (2026-07-20): 8899 TRÙNG cổng OmniVoice TTS server của
  # aigen-pipeline (`config/tts.config.json: omnivoiceLocal.endpoint` +
  # `scripts/omnivoice_server.py --port 8899`). Trên VPS cả hai cùng chạy nên
  # sẽ tranh cổng ngay khi bật asset_server_enabled. Đổi BÊN NÀY vì không có
  # dữ liệu nào phụ thuộc: link AssetPath trên Sheet được ghi lại mỗi lần
  # render (scripts/render_production_assets.py), còn cổng OmniVoice thì nằm
  # rải trong config + client TS + tài liệu.
  asset_server_port: 8898
  # Sheet UI cleanup Phase 6d — TẮT mặc định trên máy dev cục bộ.
  # system_power_on.py (thư mục gốc dự án — lệnh gọi hệ thống, không còn nằm
  # trong scripts/) đọc cờ này để TỰ khởi động asset server cùng 2 lịch
  # crawl/draft (xem system_power_on.py::_start_asset_server) — chưa bật vì
  # máy dev không cần phục vụ HTTP suốt 24/7. BẬT (true) khi triển khai VPS
  # để chạy full service chỉ bằng `python system_power_on.py`, không cần
  # lệnh tay `scripts/serve_assets.py` riêng.
  asset_server_enabled: false

# --- Brand kit render Infographic (src/twmkt/render/infographic.py, $0 tất định) --
# Đổi màu/font/kích thước ở ĐÂY, KHÔNG sửa code. SVG thuần (không phụ thuộc
# Pillow/cairo) -> mở trực tiếp bằng trình duyệt hoặc export PNG bằng công cụ
# thiết kế khi cần đăng MXH.
render:
  infographic:
    width: 1080
    height: 1350                  # tỉ lệ 4:5 — hợp Facebook/Instagram feed
    bg: "#0B1B2B"                  # nền navy đậm
    surface: "#132A3E"             # thẻ số liệu
    primary: "#E7C873"             # vàng đồng — nhấn số liệu/emphasis
    text: "#F5F5F0"
    text_muted: "#9FB3C8"
    font_family: "Arial, 'Segoe UI', sans-serif"

# --- Prompt agent sản xuất (version-controlled, đổi văn phong không sửa code) --
# Tab PROMPTS (Name|Version|Enable) trên Sheet chọn version đang dùng; nội dung
# nằm ở prompts/<name>.<version>.md (repo). Thiếu tab/dòng/file -> default nội bộ.
prompts:
  dir: "prompts"

# --- Nguồn thu thập: mô hình 3 lớp (config-first, khớp SOURCES sheet) --------
# fetch_type: "html" (mặc định, chưa khai = html) -> HttpFirstCollector, crawl
#   trang mục + full bài luôn (như trước). "rss" -> RssCollector: TẦNG 1 phát
#   hiện nhẹ (title/summary/category, KHÔNG fetch full) — bài GIỮ được sau lọc
#   mới full-fetch qua HttpFirstCollector.fetch_one (TẦNG 3, xem review_to_sheet.py).
# field: gợi ý Field (taxonomy) cho CẢ nguồn — kết hợp <category> RSS (nếu có)
#   + từ khóa TAXONOMY ở curation.enrich.classify_field_topic.
# title_selector/body_selector/noise_selectors/ticker_box_selector: ĐĂNG KÝ
#   THEO url CỦA CHÍNH NGUỒN (dù rss hay html) — fetch_one() tra selector theo
#   url gốc này để full-fetch bài rss được giữ, KHÔNG theo url từng bài riêng lẻ.
# priority: số lớn hơn = xử lý trước (sources_from_rows/build_sources tự sắp).
sources:
  # --- CafeF (html — trang mục, giữ nguyên hành vi cũ) ---
  - key: "cafef-doanh-nghiep"
    name: "CafeF - Doanh nghiệp"
    url: "https://cafef.vn/doanh-nghiep.chn"
    type: "news"
    fetch_type: "html"
    field: "DoanhNghiep"
    priority: 5
    interval_minutes: 240   # 4h - bao lâu crawl lại nguồn này (0 = dùng schedule.interval_minutes)
    enabled: true
    article_url_pattern: "-\\d{6,}\\.chn$"        # link bài: /<slug>-<id>.chn
    title_selector: "h1"
    body_selector: "div.detail-content.afcbc-body"  # thân bài (soi DOM thật)
  - key: "cafef-vi-mo"
    name: "CafeF - Vĩ mô"
    url: "https://cafef.vn/vi-mo-dau-tu.chn"   # slug thật (vi-mo.chn -> 404)
    type: "news"
    fetch_type: "html"
    field: "ViMo"
    priority: 5
    interval_minutes: 240   # 4h - bao lâu crawl lại nguồn này (0 = dùng schedule.interval_minutes)
    enabled: true
    article_url_pattern: "-\\d{6,}\\.chn$"
    title_selector: "h1"
    body_selector: "div.detail-content.afcbc-body"   # cùng template doanh-nghiep
  - key: "cafef-tai-chinh-quoc-te"
    name: "CafeF - Tài chính quốc tế"
    url: "https://cafef.vn/tai-chinh-quoc-te.chn"
    type: "news"
    fetch_type: "html"
    field: "TheGioi"
    priority: 5
    interval_minutes: 240   # 4h - bao lâu crawl lại nguồn này (0 = dùng schedule.interval_minutes)
    enabled: true
    article_url_pattern: "-\\d{6,}\\.chn$"
    title_selector: "h1"
    body_selector: "div.detail-content.afcbc-body"   # cùng template doanh-nghiep

  # --- CafeF (rss — tầng 1 phát hiện; FeedURL thật, lấy từ https://cafef.vn/rss.chn) ---
  - key: "cafef-rss-chung-khoan"
    name: "CafeF - RSS Chứng khoán"
    url: "https://cafef.vn/thi-truong-chung-khoan.rss"
    type: "news"
    fetch_type: "rss"
    field: "ChungKhoan"
    priority: 4
    interval_minutes: 240   # 4h - bao lâu crawl lại nguồn này (0 = dùng schedule.interval_minutes)
    enabled: true
    article_url_pattern: "-\\d{6,}\\.chn$"       # dùng khi fetch_one() full-fetch bài giữ
    title_selector: "h1"
    body_selector: "div.detail-content.afcbc-body"
  - key: "cafef-rss-bat-dong-san"
    name: "CafeF - RSS Bất động sản"
    url: "https://cafef.vn/bat-dong-san.rss"
    type: "news"
    fetch_type: "rss"
    field: "BatDongSan"
    priority: 4
    interval_minutes: 240   # 4h - bao lâu crawl lại nguồn này (0 = dùng schedule.interval_minutes)
    enabled: true
    article_url_pattern: "-\\d{6,}\\.chn$"
    title_selector: "h1"
    body_selector: "div.detail-content.afcbc-body"

  # --- CafeBiz (rss — cafebiz.vn/rss/<muc>.rss; cùng hệ VCCorp nhưng khác class DOM) ---
  - key: "cafebiz-rss-vi-mo"
    name: "CafeBiz - RSS Vĩ mô"
    url: "https://cafebiz.vn/rss/vi-mo.rss"
    type: "news"
    fetch_type: "rss"
    field: "ViMo"
    priority: 4
    interval_minutes: 240   # 4h - bao lâu crawl lại nguồn này (0 = dùng schedule.interval_minutes)
    enabled: true
    article_url_pattern: "-\\d{6,}\\.chn$"
    title_selector: "h1"
    body_selector: ".detail-content"             # KHÔNG có hậu tố afcbc-body như CafeF
  - key: "cafebiz-rss-chinh-sach"
    name: "CafeBiz - RSS Chính sách"
    url: "https://cafebiz.vn/rss/chinh-sach.rss"
    type: "news"
    fetch_type: "rss"
    field: "ChinhSach"
    priority: 4
    interval_minutes: 240   # 4h - bao lâu crawl lại nguồn này (0 = dùng schedule.interval_minutes)
    enabled: true
    article_url_pattern: "-\\d{6,}\\.chn$"
    title_selector: "h1"
    body_selector: ".detail-content"
  - key: "cafebiz-rss-the-gioi"
    name: "CafeBiz - RSS Thế giới"
    url: "https://cafebiz.vn/rss/the-gioi.rss"
    type: "news"
    fetch_type: "rss"
    field: "ViMo"
    priority: 4
    interval_minutes: 240   # 4h - bao lâu crawl lại nguồn này (0 = dùng schedule.interval_minutes)
    enabled: true
    article_url_pattern: "-\\d{6,}\\.chn$"
    title_selector: "h1"
    body_selector: ".detail-content"

  # --- Vietstock (rss — vietstock.vn/rss, khác domain/template hoàn toàn) ---
  - key: "vietstock-rss-co-phieu"
    name: "Vietstock - RSS Cổ phiếu"
    url: "https://vietstock.vn/830/chung-khoan/co-phieu.rss"
    type: "news"
    fetch_type: "rss"
    field: "ChungKhoan"
    priority: 3
    interval_minutes: 240   # 4h - bao lâu crawl lại nguồn này (0 = dùng schedule.interval_minutes)
    enabled: true
    article_url_pattern: "-\\d+\\.htm$"          # link bài Vietstock: .../<slug>-<id>.htm
    title_selector: "h1"
    body_selector: "#vst_detail"                 # sạch hơn .article-content (bỏ chrome thời gian)
    noise_selectors: ["script", "style"]

# --- Tầng crawl (robustness) ----------------------------------------
crawl:
  engine: "http"                  # http (httpx+bs4, $0) | crawl4ai (fallback JS)
  limit_per_source: 12
  http_first: true                # thử HTTP tĩnh trước, fallback Playwright
  respect_robots: true
  rate_limit_s: 1.5
  rate_limit_jitter_s: 0.7
  timeout_s: 30
  concurrency: 1
  max_retries: 3
  backoff_base_s: 2.0
  user_agent: "FVACapitalBot/0.2 (+contact: trieuvanstock@gmail.com)"   # đổi brand: sửa Ở ĐÂY (collectors/ đọc config.default_user_agent() nếu để trống)
  stealth: true
  # Selector mặc định (dùng khi source không tự khai) + box nhiễu cần loại.
  article_url_pattern: "-\\d{6,}\\.chn$"
  title_selector: "h1"
  body_selector: "div.detail-content.afcbc-body"
  ticker_box_selector: ".chisochungkhoan"  # box mã CK CafeF: trích mã rồi loại chrome giá
  noise_selectors:
    - "#listNewsInContent"        # box "TIN MỚI" nhúng trong thân bài
    - ".VCSortableInPreviewMode"  # widget xem trước ảnh/box
    - "script"
    - "style"

# --- Chuẩn hóa & lọc (Tầng 0 - free) --------------------------------
curation:
  tickers_file: "data/tickers_full.txt"   # whitelist đầy đủ (1526 mã); VN30 giữ cho test
  watchlist_file: "data/tickers.txt"       # watchlist CỐ ĐỊNH (~325 mã) do team quản lý thủ công —
                                            # đọc NGUYÊN file, không có script nào tính/sinh lại nó
  ambiguous_file: "data/tickers_ambiguous.txt"
  ambiguous_context_window: 40
  relevance:
    keywords_file: "data/keywords_macro.txt"
    min_macro_keywords: 2         # giữ bài macro khi >= n từ khóa (nếu 0 mã)

  # Nhóm chủ đề (curation/enrich.py: classify) — khớp từ khóa không phân biệt
  # hoa/thường trên title+thân bài. 1 bài có thể khớp nhiều/0 nhóm. Mirror
  # DEFAULT_GROUPS trong code (dự phòng khi mục này rỗng) — đưa ra đây để team
  # chỉnh không cần sửa code. LƯU Ý: "nhóm ƯU TIÊN hiện hành" (PriorityGroups)
  # KHÔNG cấu hình ở đây — đọc LIVE từ tab SETTINGS trên Google Sheet mỗi lần
  # chạy, để team đổi theo pha thị trường mà không cần sửa code/deploy lại
  # (xem sheets_board.SheetsBoard.read_priority_groups).
  groups:
    ChinhSach:            # chính sách, pháp lý, quản lý nhà nước
      - "nghị định"
      - "nghị quyết"
      - "thông tư"
      - "chính phủ"
      - "thủ tướng"
      - "sbv"
      - "ngân hàng nhà nước"
      - "nhnn"
      - "bộ tài chính"
      - "quốc hội"
      - "lãi suất điều hành"
      - "room tín dụng"
    ViMoVN:               # vĩ mô Việt Nam
      - "gdp"
      - "lạm phát"
      - "cpi"
      - "tỷ giá"
      - "tỉ giá"
      - "tăng trưởng"
      - "xuất khẩu"
      - "nhập khẩu"
      - "fdi"
      - "dự trữ ngoại hối"
      - "cung tiền"
    ViMoTheGioi:          # vĩ mô / thị trường quốc tế
      - "fed"
      - "phố wall"
      - "dow jones"
      - "nasdaq"
      - "s&p"
      - "ecb"
      - "opec"
      - "trung quốc"
      - "nhật bản"
      - "châu âu"
      - "giá dầu"
      - "vàng thế giới"
      - "nga"
      - "iran"
      - "ukraine"
      - "thị trường mỹ"
      - "lao động mỹ"

  # Trọng số marketing_score/hotness_pct (curation/enrich.py). Giá trị dưới =
  # mặc định code hiện tại (đưa ra config để team chỉnh không cần sửa code).
  score:
    marketing:
      ticker: 3      # mỗi mã CK khớp whitelist thanh khoản
      macro: 2       # mỗi từ khóa vĩ mô khớp (data/keywords_macro.txt)
      news: 1        # tín hiệu "đáng lên bài" (%, kỷ lục, tăng/giảm mạnh...)
    hotness:
      priority: 4    # bài thuộc >=1 nhóm ưu tiên hiện hành (đọc LIVE từ SETTINGS)
      ticker: 2
      news: 2
      macro: 2

  # TAXONOMY: Field|Topic|Keywords (curation/enrich.py: classify_field_topic).
  # Dự phòng khi tab TAXONOMY trên Sheet trống — team thường sửa TRÊN SHEET
  # (đọc LIVE mỗi lần chạy), mục này chỉ là fallback offline/test.
  taxonomy:
    - field: "ChinhSach"
      topic: "TienTe"
      keywords: ["lãi suất điều hành", "room tín dụng", "ngân hàng nhà nước", "nhnn", "sbv"]
    - field: "ChinhSach"
      topic: "PhapLy"
      keywords: ["nghị định", "nghị quyết", "thông tư", "luật", "quốc hội"]
    - field: "ViMo"
      topic: "TrongNuoc"
      keywords: ["gdp", "lạm phát", "cpi", "tăng trưởng", "xuất khẩu", "nhập khẩu", "fdi"]
    - field: "ViMo"
      topic: "TheGioi"
      keywords: ["fed", "ecb", "phố wall", "dow jones", "trung quốc", "giá dầu"]
    - field: "DoanhNghiep"
      topic: "KetQuaKinhDoanh"
      keywords: ["lợi nhuận", "doanh thu", "cổ tức"]
    - field: "DoanhNghiep"
      topic: "BatDongSan"
      keywords: ["bất động sản", "dự án", "quy hoạch"]
    - field: "ChungKhoan"
      topic: "ThiTruong"
      keywords: ["vn-index", "vnindex", "hnx-index", "thanh khoản", "khối ngoại", "cổ phiếu"]

# --- Knowledge / RAG (Tầng 0-1) -------------------------------------
knowledge:
  chunk_size: 500
  chunk_overlap: 80
  embedder: "hashing"             # hashing (free) | sentence-transformers
  top_k: 5
  vector_store: "memory"          # memory | qdrant

# --- LLM: phân tầng token -------------------------------------------
# BẬT LLM thật CHỈ cho Researcher + Hook (tầng rẻ Haiku) để nếm chất lượng trên
# dữ liệu CafeF thật + đo token. Producers (article/video) tầng đắt (content_model)
# CHỈ chạy SAU cổng duyệt 1 -> run_pipeline dừng trước cổng nên chúng chưa tốn token.
llm:
  provider: "anthropic"           # mock | anthropic (thiếu SDK/khóa -> LÙI MƯỢT về $0)
  triage_model: "claude-haiku-4-5-20251001"   # RESEARCHER (tầng rẻ, đo token trước)
  hook_model: "claude-sonnet-4-6"             # HOOK (Sonnet: hook ngắn -> rẻ mà chất lượng cao)
  content_model: "claude-sonnet-4-6"          # Producers (tầng 2) — chưa bật ở bước này
  max_tokens: 1500
  budget_usd: 1.0                 # hạn mức mềm cho 1 lần chạy (LLMRouter -> BudgetExceeded)

  # --- Adapter mới (factory.make_llm), SONG SONG với provider/*_model + LLMRouter
  # ở trên (KHÔNG thay thế) — dùng cho pipeline Research/Router/Writer (Brief →
  # StructureRouter → Voice-lock động). mode chọn backend; step_models chọn model
  # theo TỪNG BƯỚC (không phải theo agent cũ) — truyền qua complete(..., model=...).
  mode: "claude_code"              # claude_code (CLI `claude -p`, gói Pro/Max, KHÔNG cần
                                    # ANTHROPIC_API_KEY riêng) | api (AnthropicLLM) | mock ($0)
  claude_code:
    timeout_s: 240                 # timeout 1 lượt `claude -p` (giây) — Phase 4.12-B: 120s
                                    # không đủ cho bước brief trên 1 số chủ đề (2/2 lần timeout
                                    # thật trên cùng 1 chủ đề), tăng tạm để backtest có kết quả
                                    # thật thay vì luôn rơi vào lùi-mượt do hạ tầng chậm.
  # ALIAS (haiku|sonnet|opus), KHÔNG phải id đầy đủ — mỗi backend tự map alias
  # -> id/cờ thật (ClaudeCodeLLM: thẳng vào --model; AnthropicLLM: bảng alias
  # riêng trong agents/base.py). Đổi model chỉ cần sửa Ở ĐÂY.
  step_models:
    brief: "haiku"                  # Research/Brief — rẻ, chỉ trích + gắn nhãn
    router: "haiku"                 # StructureRouter — phân loại/chọn khung, rẻ
    # ACTIVE_TASK (tích hợp CONTENT_WRITER_RULES) — CHỐT Opus cho writer/
    # composer theo prompts/content_writer_rules.md §1 (luận điểm/phân tích/
    # giọng văn tốt hơn) + SỐ LIỆU THẬT đo Phase 3.2 (A/B Sonnet vs Opus, 3
    # bài, xem reports/ab_writer_20260715.md): Opus 0 vi phạm guardrail cả 6
    # bản, 8/8 field, latency THẤP HƠN Sonnet trong lượt đo — không chỉ vì
    # rules file yêu cầu. KHÔNG hạ lại Sonnet nếu không kèm số liệu A/B mới.
    writer: "opus"                  # Writer (article/video) — Opus
    composer: "opus"                # Infographic Composer — Opus, ép nén ngắn như haiku qua prompt (§1)
  # Bước nào PHẢI fail-loud (raise LLMCallError khi lỗi thay vì lùi mượt trả "")
  # — Writer sinh nội dung thật, KHÔNG được âm thầm ghi CONTENT rỗng. Bước phụ
  # (hook/enrich/brief-label) KHÔNG liệt ở đây -> giữ lùi mượt như trước.
  fail_loud_steps: ["writer"]

# --- Writer retry (Phase 4.5, gắn lên fail_loud ở trên) --------------
# Lỗi TẠM THỜI (timeout/rate-limit/exit≠0 -> LLMCallError, xem agents/base.py)
# -> thử lại tối đa max_retries lần, chờ retry_backoff_s giữa các lần. Lỗi VĨNH
# VIỄN (guardrail reject/claim cấm, LLM ĐÃ trả lời nhưng nội dung không sạch)
# -> KHÔNG retry, đánh dấu NEEDS_HUMAN ngay (xem agents/writer.run_writer_with_retry).
writer:
  max_retries: 1        # số lần thử LẠI (không tính lượt đầu)
  retry_backoff_s: 3     # chờ giữa các lần thử lại (giây)
  timeout_s: 120          # timeout riêng cho LLM client bước writer (factory.build_writer_llm)

# --- Thông báo vận hành (PHASE TELE, src/twmkt/utils/telegram_notifier.py) --
# 1 chiều, KHÔNG chặn luồng chính — báo qua Telegram khi bắt đầu xử lý/đổi nội
# dung/duyệt xong Gate 2/lỗi. bot_token/chat_id qua ${ENV} (secrets/.env),
# KHÔNG hardcode giá trị thật ở đây. Thiếu ENV/enabled=false -> no-op êm.
# CỜ THỦ CÔNG nhanh (không cần sửa/commit file này): ENV TWMKT_TELEGRAM_ENABLED
# = 1/true/yes/on (bật) | 0/false/no/off (tắt) — đè `enabled` bên dưới khi có
# mặt, xem make_notifier() trong telegram_notifier.py.
notifications:
  telegram:
    enabled: true
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
    parse_mode: HTML
    timeout_s: 5

# --- Sản xuất nội dung ----------------------------------------------
producers:
  hook: true                      # bước Hook (góc marketing) - mục b/c
  article: true
  infographic: true               # tất định, $0
  video_script: true
  newsletter: true                # tất định, $0

# --- Route-once (Phase 4.8 Mục A, agents/route_once.py) --------------
# RouterDecision đóng băng theo chủ đề (JSON file, KHÔNG day-partition — trạng
# thái "đã chốt", owner tự xoá bằng scripts/reroute.py khi cần route lại).
# Đường dẫn CON tính từ storage.data_root (Phase DATA-ROOT, xem config.data_path()).
router:
  decisions_path: "state/router_decisions.json"

# --- Guardrail số canonical (Phase 4.8 Mục C, agents/production.py) --------
# Số TRONG BÀI khớp với 1 fact.canonical_value trong khoảng dung sai -> KHÔNG
# coi là bịa số. Mặc định khớp CHÍNH XÁC (0%); nới ≤ approx_tolerance_pct%
# CHỈ KHI số trong bài đi kèm từ xấp xỉ (gần/khoảng/xấp xỉ/hơn/trên/dưới).
guardrail:
  approx_tolerance_pct: 5
  # Content Factory Phase 1 — giá trị hợp lệ cho Fact.entity_type (shape="entity",
  # models.py) khi Brief gắn nhãn 1 thực thể ĐƠN có tên (models.FACT_SHAPES).
  # Quyết định Composer/renderer hiển thị (mã CK -> badge, chính sách -> nhãn,
  # địa danh -> điểm trên bản đồ...) — đọc từ ĐÂY (settings.get("guardrail.
  # entity_types"), cùng kiểu llm.step_models/fail_loud_steps), KHÔNG hard-code
  # trong agents/brief.py. Loại lạ ngoài danh sách -> "other"
  # (KHÔNG loại bỏ Fact, xem agents/brief.facts_from_llm_output Phase 2).
  entity_types: ["ticker", "company", "policy", "place", "person", "project", "other"]
  # Content Factory Phase 2b — giá trị hợp lệ cho Fact.salience (shape="entity"/
  # "entity_list") — "subject" (chủ thể tin, LÊN HÌNH related/priority.primary)
  # | "context" (phông nền/nguồn phát ngôn, CHỈ lưu để truy vết, KHÔNG lên
  # hình). Đọc từ ĐÂY (settings.get("guardrail.entity_salience")), KHÔNG
  # hard-code trong agents/brief.py.
  entity_salience: ["subject", "context"]

# --- Voice-lock ĐỘNG (xem docs/voice_examples.md, agents/voice.assemble_voice) --
# $0 (chỉ đọc file cục bộ, không thêm lệnh gọi API). Phase 4: khung/hook/anchor
# giờ do StructureRouterAgent chọn ĐỘNG mỗi bài (agents/structure_router.py) rồi
# assemble_voice(decision) lắp system prompt Writer — KHÔNG còn map tĩnh
# format_example trong config (đã bỏ; map anchor mặc định nay nằm trong code,
# xem voice.py::_DEFAULT_ANCHOR_BY_STRUCTURE, theo bảng ở §0 voice_examples.md).
voice:
  enabled: true
  examples_path: docs/voice_examples.md

# --- Cổng duyệt người-trong-vòng-lặp --------------------------------
gates:
  research:
    type: "console"               # console | auto | sheets
  content:
    type: "console"

# --- Google Sheets (control-plane cho cổng duyệt) -------------------
sheets:
  # Ưu tiên biến môi trường nếu đặt; nếu không, dùng giá trị dưới đây.
  spreadsheet_id: "157b9WY9cpgLvzNP2TH8loN-6AiEy6YXmGpFdObYhNwo"
  creds_path: "secrets/sa.json"        # forward slash chạy cả Windows/Linux
  # RÀO CHẮN MÔI TRƯỜNG (Content Factory Phase D) — sheet RIÊNG cho benchmark/
  # A-B/thử nghiệm (Phase 3 trở đi), TÁCH KHỎI spreadsheet_id (production) ở
  # trên. config.resolve_sheet_id(settings, allow_production=...) MẶC ĐỊNH LUÔN
  # đọc key này (hoặc ENV TWMKT_TEST_SHEET_ID) — KHÔNG BAO GIỜ ngầm định lùi về
  # spreadsheet_id production dù đã set sẵn trong môi trường. Tạo 1 Google Sheet
  # TEST riêng (khác hẳn Sheet production ở trên) rồi điền ID vào đây/ENV.
  test_spreadsheet_id: ""
  # Sheet UI cleanup Phase 5 — Sheet VẬN HÀNH RIÊNG cho tab backup/archive
  # (*_backup_*), TÁCH KHỎI spreadsheet_id (production) — KHÔNG phải "db"
  # (TopicKey Document Store chưa xây). Người vận hành tự tạo + share quyền
  # Editor cho Service Account (client_email trong creds_path), KHÔNG phải
  # Service Account tự tạo (để người vận hành giữ quyền Owner trên Drive của
  # chính họ, dễ quản lý/tìm lại). Mỗi tab chuyển sang đây có dòng đầu:
  # "Thông tin dành cho người điều hành sheet — chỉ Owner được sửa."
  archive_spreadsheet_id: "1jMJiLw8i2_z5lC8BTGEuCb6BpDZcSnda-_eHGM2bR4E"
  research_worksheet: "ResearchReview"
  content_worksheet: "ContentReview"
  poll_interval_s: 15
  timeout_s: 86400
  on_timeout: "reject"
  # LỚP 5 (Phase 1) — TopicKey (curation.keys.compute_topic_key): danh tính bền
  # của 1 chủ đề, neo CONTENT vào CONTEXT KHÔNG theo vị trí dòng (xem
  # src/twmkt/curation/keys.py). column_name CHỈ để tham chiếu tài liệu (tên cột
  # thật là hằng số CONTEXT_HEADER/CONTENT_HEADER trong sheets_board.py — đổi
  # tên cột là đổi schema, không phải tham số vận hành, xem báo cáo Phase 1).
  topic_key:
    column_name: "TopicKey"
    key_length: 16   # CẢNH BÁO: đổi SAU khi đã có dữ liệu sẽ làm khoá cũ/mới lệch nhau
    # PHASE 1R — denylist tham số query KHÔNG định danh nội dung (tracking) —
    # bị BỎ khi chuẩn hoá URL; MỌI tham số khác (vd ?id=, ?p=) được GIỮ NGUYÊN
    # vì nhiều site dùng query làm định danh bài thật (xem curation/keys.py).
    tracking_params:
      - utm_source
      - utm_medium
      - utm_campaign
      - utm_term
      - utm_content
      - gclid
      - fbclid
      - ref
      - cmpid
      - igshid
      - mc_cid
      - mc_eid

# --- Phân phối ------------------------------------------------------
publishers:
  - key: "console"
    enabled: true

# --- Lập lịch tự động: CRAWL (Sources -> CONTEXT) --------------------
# python scripts/run_scheduler.py                       (loop nội bộ, cần enabled=true)
# python scripts/run_scheduler.py --once                (1 lần — dùng cho OS scheduler)
# python scripts/run_scheduler.py --print-os            (in lệnh Task Scheduler/cron)
# python system_power_on.py (thư mục gốc dự án)  chạy CẢ 2 lịch (crawl +
#   schedule_draft) 1 lần, 1 tiến trình, chạy NGAY 1 lượt khi khởi động
#   (run_on_start=true) rồi lặp lại theo interval_minutes.
schedule:
  enabled: true                   # true = bật vòng lặp nội bộ
  mode: "interval"                # interval | daily
  interval_minutes: 240           # dùng khi mode=interval (mặc định 4h — khớp SOURCES.Interval)
  at_times: ["08:30", "16:00"]    # dùng khi mode=daily (giờ địa phương theo timezone)
  timezone: "Asia/Ho_Chi_Minh"
  jitter_s: 30                    # nhiễu +[0..jitter_s]s tránh dồn tải đúng mốc
  run_on_start: true              # chạy ngay 1 lần khi khởi động loop
  max_runs: 0                     # 0 = vô hạn; >0 = dừng sau N lần (test/CI)
  job: "review_to_sheet"          # review_to_sheet (crawl thật -> Sheet) | run_pipeline
  hook_offline: true              # true = Hook lịch tự động dùng fallback $0 (KHÔNG gọi
                                   # Sonnet), tránh phát sinh phí API mỗi giờ 24/7 không
                                   # giám sát. Chạy tay `python scripts/review_to_sheet.py`
                                   # (không --offline) vẫn dùng Sonnet thật khi cần Hook hay.

# --- Lập lịch tự động: SẢN XUẤT (CONTEXT.APPROVE -> chuẩn bị --draft) ------
# Chạy độc lập với lịch crawl ở trên (section riêng, không đụng nhau). Job
# "produce_draft" CHỈ full-fetch + tạo request chờ (KHÔNG tự --ingest — bước
# viết nội dung vẫn cần Claude Code chủ động đọc + trả lời + chạy --ingest).
# 100% $0: không gọi LLM nào (infographic tất định, article/video chỉ CHUẨN BỊ
# file .prompt.md chờ Claude Code trả lời thủ công).
# python scripts/run_scheduler.py --section schedule_draft --once
schedule_draft:
  enabled: true                   # true = bật vòng lặp nội bộ
  mode: "interval"
  interval_minutes: 30            # tần suất --draft (mặc định 30 phút/lần)
  timezone: "Asia/Ho_Chi_Minh"
  jitter_s: 30
  run_on_start: true
  max_runs: 0
  job: "produce_draft"            # produce_draft (chuẩn bị request) — không có lựa chọn khác

# --- Giới hạn xử lý mỗi lần --draft (config-first, tránh hard-code trong scheduler)
production:
  draft_limit: 5                  # số dòng CONTEXT APPROVE tối đa xử lý mỗi lần --draft

# --- Production Factory: seam gọi AIGEN pipeline thật (media_factory/aigen_seam.py) --
# CÙNG NẾP với storage.data_root: đường dẫn SIBLING NGOÀI repo, đọc qua
# src/twmkt/config.py::aigen_repo_path(). Override bằng biến môi trường
# AIGEN_REPO_PATH khi đổi máy (VPS) — KHÔNG sửa code, chỉ đổi 1 dòng ở đây
# hoặc set ENV. Repo AIGEN chính thức = github.com/trieuvan-s/aigen-pipeline
# (aigen-fva-capital ĐÃ CHẾT, không còn dùng — xem docs/VPS_MIGRATION_BACKLOG.md A3).
media_factory:
  aigen_repo_path: "../aigen-pipeline"
